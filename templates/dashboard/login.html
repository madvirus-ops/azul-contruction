<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Azul Environmental Engineering</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #070d14;
            --bg-card: #111d2b;
            --text: #e2e8f0;
            --text-muted: #7b8da0;
            --accent: #2dd4bf;
            --accent-dark: #14b8a6;
            --accent-glow: rgba(45, 212, 191, 0.2);
            --accent-dim: rgba(45, 212, 191, 0.08);
            --border: rgba(255, 255, 255, 0.06);
            --radius: 10px;
            --radius-sm: 7px;
            --font: 'Inter', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 16px; }
        body {
            font-family: var(--font); background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            -webkit-font-smoothing: antialiased;
            background-image:
                radial-gradient(ellipse at 30% 20%, rgba(45, 212, 191, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(45, 212, 191, 0.03) 0%, transparent 50%);
        }
        .login-container { width: 100%; max-width: 420px; padding: 20px; }
        .login-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px;
            padding: 48px 40px; box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        }
        .login-brand {
            display: flex; flex-direction: column; align-items: center; margin-bottom: 36px;
        }
        .login-brand__icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border-radius: 14px; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.5rem; color: #070d14; box-shadow: 0 8px 30px var(--accent-glow);
            margin-bottom: 16px;
        }
        .login-brand__text { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.02em; }
        .login-brand__sub { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 3px; margin-top: 4px; }
        .login-form { display: flex; flex-direction: column; gap: 18px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; }
        .form-group input {
            padding: 13px 16px; background: var(--bg); border: 1px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text); font-family: var(--font); font-size: 0.95rem;
            transition: all 0.25s ease;
        }
        .form-group input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
        .btn {
            padding: 13px 24px; font-size: 0.95rem; font-weight: 600;
            border-radius: var(--radius-sm); border: none; cursor: pointer;
            transition: all 0.25s ease; font-family: var(--font); margin-top: 8px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #070d14;
        }
        .btn:hover { box-shadow: 0 8px 25px var(--accent-glow); transform: translateY(-1px); }
        .error-msg {
            background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.2);
            color: #f87171; padding: 12px 16px; border-radius: var(--radius-sm); font-size: 0.85rem;
            display: flex; align-items: center; gap: 8px;
        }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { font-size: 0.85rem; color: var(--text-muted); transition: color 0.2s; }
        .back-link a:hover { color: var(--accent); }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-brand">
                <div class="login-brand__icon">A</div>
                <div class="login-brand__text">Azul Admin</div>
                <div class="login-brand__sub">Management Panel</div>
            </div>

            {% if messages %}
                {% for message in messages %}
                <div class="error-msg"><i class="fa-solid fa-circle-exclamation"></i> {{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="post" class="login-form">
                {% csrf_token %}
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Enter your username" required autofocus>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn"><i class="fa-solid fa-right-to-bracket"></i> Sign in</button>
            </form>

            <div class="back-link">
                <a href="{% url 'home' %}"><i class="fa-solid fa-arrow-left"></i> Back to website</a>
            </div>
        </div>
    </div>
</body>
</html>
